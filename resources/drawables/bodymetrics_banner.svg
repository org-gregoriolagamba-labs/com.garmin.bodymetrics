  <rect x="32" y="147" width="196" height="6" rx="3" fill="#222230"/>
  <rect x="32" y="147" width="49" height="6" rx="3" fill="#3DCC6E"/>
  <rect x="81" y="147" width="49" height="6" fill="#F5C518"/>
  <rect x="130" y="147" width="49" height="6" fill="#FF8C00"/>
  <rect x="179" y="147" width="49" height="6" rx="3" fill="#E24B4A"/>
  <circle cx="115" cy="150" r="4" fill="#FFF" stroke="#141416" stroke-width="1.5"/>

  <text x="32" y="172" font-family="'SF Pro Text','Helvetica Neue',Arial,sans-serif" font-size="9.5" fill="#666677" letter-spacing="0.5">BODY WATER</text>
  <rect x="32" y="176" width="196" height="6" rx="3" fill="#222230"/>
  <rect x="32" y="176" width="49" height="6" rx="3" fill="#3DCC6E"/>
  <rect x="81" y="176" width="49" height="6" fill="#F5C518"/>
  <rect x="130" y="176" width="49" height="6" fill="#FF8C00"/>
  <rect x="179" y="176" width="49" height="6" rx="3" fill="#E24B4A"/>
  <circle cx="62" cy="179" r="4" fill="#FFF" stroke="#141416" stroke-width="1.5"/>

