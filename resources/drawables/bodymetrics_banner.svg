  <rect x="32" y="252" width="34" height="14" rx="3" fill="#1E2A1E"/>
  <text x="49" y="262" text-anchor="middle" font-family="'SF Pro Text','Helvetica Neue',Arial,sans-serif" font-size="8.5" fill="#3DCC6E" font-weight="600" letter-spacing="0.3">FREE</text>
  <rect x="72" y="252" width="80" height="14" rx="3" fill="#1A1A2E"/>
  <text x="112" y="262" text-anchor="middle" font-family="'SF Pro Text','Helvetica Neue',Arial,sans-serif" font-size="8.5" fill="#7B8FCC" font-weight="500">Garmin Connect</text>
  <rect x="158" y="252" width="52" height="14" rx="3" fill="#22201A"/>
  <text x="184" y="262" text-anchor="middle" font-family="'SF Pro Text','Helvetica Neue',Arial,sans-serif" font-size="8.5" fill="#B89A4A" font-weight="500">Index S2</text>

  <line x1="268" y1="24" x2="268" y2="246" stroke="#2A2A35" stroke-width="0.5"/>

  <!-- ══ FORERUNNER 265 ══ center (378,131) case r=70
       Arc r=50, CW from 8 o'clock (335,156) to 4 o'clock (421,156) via 12
       Zone boundaries: green 8→10 (335,156→335,106)
                        yellow 10→12 (335,106→378,81)
                        orange 12→2  (378,81→421,106)
                        red    2→4   (421,106→421,156)
       Green midpoint = 9 o'clock = (328, 131)
  -->

  <!-- Straps -->
  <rect x="352" y="5"   width="52" height="26" rx="6" fill="#18181E"/>
  <rect x="352" y="231" width="52" height="26" rx="6" fill="#18181E"/>

  <!-- Case -->
  <circle cx="378" cy="131" r="71.5" fill="none" stroke="#3A3A44" stroke-width="1"/>
  <circle cx="378" cy="131" r="70"   fill="#1A1A1E"/>
  <circle cx="378" cy="131" r="64"   fill="none" stroke="#0D0D14" stroke-width="2.5"/>

  <!-- LEFT: LIGHT · UP · DOWN -->
  <rect x="294" y="97"  width="14" height="14" rx="2" fill="#222228" stroke="#13131A" stroke-width="0.5"/>
  <rect x="295.5" y="98.5"  width="11" height="11" rx="1.5" fill="#2A2A30"/>
  <rect x="294" y="121" width="14" height="19" rx="2" fill="#222228" stroke="#13131A" stroke-width="0.5"/>
  <rect x="295.5" y="122.5" width="11" height="16" rx="1.5" fill="#2A2A30"/>
  <rect x="294" y="150" width="14" height="14" rx="2" fill="#222228" stroke="#13131A" stroke-width="0.5"/>
  <rect x="295.5" y="151.5" width="11" height="11" rx="1.5" fill="#2A2A30"/>

  <!-- RIGHT: START/STOP · BACK -->
  <rect x="448" y="100" width="14" height="26" rx="2" fill="#222228" stroke="#13131A" stroke-width="0.5"/>
  <rect x="449.5" y="101.5" width="11" height="23" rx="1.5" fill="#2A2A30"/>
  <rect x="448" y="138" width="14" height="15" rx="2" fill="#222228" stroke="#13131A" stroke-width="0.5"/>
  <rect x="449.5" y="139.5" width="11" height="12" rx="1.5" fill="#2A2A30"/>

  <!-- Screen -->
  <circle cx="378" cy="131" r="60" fill="#07070E" stroke="#1C1C26" stroke-width="0.5"/>
  <text x="378" y="211" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="6.5" fill="#2A2A36" letter-spacing="3.5">GARMIN</text>

  <clipPath id="scrFinal">
    <circle cx="378" cy="131" r="58"/>
  </clipPath>
  <g clip-path="url(#scrFinal)">
    <circle cx="378" cy="131" r="58" fill="#070710"/>

    <!-- Arc track -->
    <path d="M 335 156 A 50 50 0 1 1 421 156" fill="none" stroke="#161620" stroke-width="9" stroke-linecap="round"/>

    <!-- Zones CW (sweep=1) -->
    <path d="M 335 156 A 50 50 0 0 1 335 106" fill="none" stroke="#3DCC6E" stroke-width="9" stroke-linecap="butt"/>
    <path d="M 335 106 A 50 50 0 0 1 378 81"  fill="none" stroke="#F5C518" stroke-width="9" stroke-linecap="butt"/>
    <path d="M 378 81  A 50 50 0 0 1 421 106" fill="none" stroke="#FF8C00" stroke-width="9" stroke-linecap="butt"/>
    <path d="M 421 106 A 50 50 0 0 1 421 156" fill="none" stroke="#E24B4A" stroke-width="9" stroke-linecap="butt"/>

    <!-- End caps -->
    <circle cx="335" cy="156" r="4.5" fill="#3DCC6E"/>
    <circle cx="421" cy="156" r="4.5" fill="#E24B4A"/>

    <!-- Indicator dot — green midpoint at 9 o'clock (328, 131) -->
    <circle cx="328" cy="131" r="6.5" fill="#3DCC6E" stroke="#070710" stroke-width="2.5"/>
    <circle cx="328" cy="131" r="2.5" fill="#FFF"/>

    <!-- Center: BMI 22.4, green -->
    <text x="378" y="113" text-anchor="middle" font-family="'SF Pro Text','Helvetica Neue',Arial,sans-serif" font-size="10" fill="#3DCC6E" letter-spacing="2.5">BMI</text>
    <text x="378" y="146" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="32" font-weight="700" fill="#FFFFFF">22.4</text>
    <text x="378" y="160" text-anchor="middle" font-family="'SF Pro Text','Helvetica Neue',Arial,sans-serif" font-size="8.5" fill="#44445A" letter-spacing="0.5">kg/m²</text>
    <text x="378" y="174" text-anchor="middle" font-family="'SF Pro Text','Helvetica Neue',Arial,sans-serif" font-size="9" fill="#3DCC6E" letter-spacing="0.3">In range</text>
  </g>

</svg>
