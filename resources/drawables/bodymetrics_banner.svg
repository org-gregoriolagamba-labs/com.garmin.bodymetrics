  <rect x="81" y="234" width="49" height="6" fill="#F5C518"/>
  <rect x="130" y="234" width="49" height="6" fill="#FF8C00"/>
  <rect x="179" y="234" width="49" height="6" rx="3" fill="#E24B4A"/>
  <circle cx="72" cy="237" r="4" fill="#FFF" stroke="#141416" stroke-width="1.5"/>

