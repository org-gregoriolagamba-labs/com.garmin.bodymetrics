  <line x1="320" y1="0" x2="320" y2="270" stroke="#fff" stroke-opacity="0.03" stroke-width="0.5"/>
  <ellipse cx="376" cy="134" rx="82" ry="82" fill="#3DCC6E" fill-opacity="0.04"/>

  <!-- Title -->
  <text x="32" y="56" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="28" font-weight="700" letter-spacing="-0.5" fill="#FFFFFF">Body<tspan fill="#3DCC6E">Metrics</tspan></text>
  <text x="32" y="78" font-family="'SF Pro Text','Helvetica Neue',Arial,sans-serif" font-size="11" fill="#888899" letter-spacing="0.2">Body composition · Health zones</text>
  <line x1="32" y1="92" x2="244" y2="92" stroke="#2A2A35" stroke-width="0.5"/>

  <!-- BMI — dot at x=56, in green zone (32–81) -->
