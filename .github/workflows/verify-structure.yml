name: Code Structure Verification

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  verify:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Verify project structure
        run: |
          echo "📁 Checking project structure..."
          
          [ -f "monkey.jungle" ] && echo "✅ monkey.jungle found" || (echo "❌ monkey.jungle not found"; exit 1)
          [ -d "source" ] && echo "✅ source/ found" || (echo "❌ source/ not found"; exit 1)
          [ -f "manifest.xml" ] && echo "✅ manifest.xml found" || (echo "❌ manifest.xml not found"; exit 1)
          
          MC_FILES=$(find source -name "*.mc" 2>/dev/null | wc -l)
          echo "✅ Found $MC_FILES Monkey C source files"
      
      - name: Check code structure and quality
        run: |
          echo "🔍 Checking code structure..."
          
          MC_FILES=$(find source -name "*.mc" 2>/dev/null)
          
          if [ -z "$MC_FILES" ]; then
            echo "❌ No .mc files found"
            exit 1
          fi
          
          echo "✅ Checking for common issues:"
          
          # Check for TODO/FIXME
          if grep -r "TODO\|FIXME\|XXX" source/ --include="*.mc" | head -5; then
            echo "⚠️  Found TODO/FIXME comments (informational)"
          fi
          
          # Check for syntax issues (basic)
          if grep -r "^[[:space:]]*$" source/ --include="*.mc" | wc -l | xargs echo "  - Empty lines:" ; then
            echo "✅ File structure verified"
          fi
      
      - name: Summary
        if: success()
        run: |
          echo "✅ Code structure verification completed"
          echo "✅ All required files present"
          echo "✅ Ready for local build and testing"
